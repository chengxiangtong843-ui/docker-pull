name: glados签到
on:
  schedule:
  # 0时区
  - cron: '35 17 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 签到
        run: |
          echo "Beijing Time: $(date -d '+8 hours')"
          checkin='https://glados.cloud/api/user/checkin'
          points='https://glados.cloud/api/user/points'
          # 调用签到接口
          resData=`curl -sS $checkin -b '${{ secrets.GLADOS_secret }}' -H 'Content-Type: application/json' -A 'Mozilla/5.0' -d '{"token":"glados.cloud"}'`
          # echo $resData
          echo $resData |jq -r '.message+". balance is "+(.list[0].balance| tonumber|round | tostring) +" points!"'
